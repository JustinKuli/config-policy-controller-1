apiVersion: v1
kind: ServiceAccount
metadata:
  name: config-policy-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  creationTimestamp: null
  name: config-policy-controller
rules:
- apiGroups:
  - '*'
  resources:
  - '*'
  verbs:
  - '*'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: config-policy-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: config-policy-controller
subjects:
- kind: ServiceAccount
  name: config-policy-controller
  namespace: open-cluster-management-agent-addon
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-policy-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-policy-controller
      name: config-policy-controller
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: config-policy-controller
      labels:
        app: config-policy-controller
        name: config-policy-controller
    spec:
      containers:
      - args:
        - controller
        - --enable-lease=true
        - --log-level=2
        - --v=0
        - --client-max-qps=35
        - --client-burst=50
        command:
        - config-policy-controller
        env:
        - name: WATCH_NAMESPACE
          value: managed
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: OPERATOR_NAME
          value: config-policy-controller
        image: quay.io/open-cluster-management/config-policy-controller:latest
        imagePullPolicy: Always
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 8081
          periodSeconds: 10
        name: config-policy-controller
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: 8081
          periodSeconds: 10
        startupProbe:
          failureThreshold: 30
          httpGet:
            path: /readyz
            port: 8081
          periodSeconds: 10
      serviceAccountName: config-policy-controller

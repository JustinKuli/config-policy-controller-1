---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-policy-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-policy-controller
      name: config-policy-controller
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: config-policy-controller
      labels:
        app: config-policy-controller
        name: config-policy-controller
    spec:
      serviceAccountName: config-policy-controller
      containers:
        - image: quay.io/open-cluster-management/config-policy-controller:latest
          name: config-policy-controller
          command:
          - config-policy-controller
          args:
            - "controller"
            - "--enable-lease=true"
            - "--log-level=2"
            - "--v=0"
            - "--client-max-qps=35"
            - "--client-burst=50"
          imagePullPolicy: Always
          env:
            - name: WATCH_NAMESPACE
              value: managed
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPERATOR_NAME
              value: "config-policy-controller"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            failureThreshold: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            failureThreshold: 3
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /readyz
              port: 8081
            failureThreshold: 30
            periodSeconds: 10
